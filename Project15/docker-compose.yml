version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0.15
    container_name: eldercare-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
