services:
  redis:
    image: redis:7-alpine
    container_name: edge-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - edge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edge-backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/edge.db
    volumes:
      - backend_data:/app/data
    depends_on:
      - redis
    networks:
      - edge-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edge-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - edge-network
    restart: unless-stopped

volumes:
  redis_data:
  backend_data:

networks:
  edge-network:
    driver: bridge
