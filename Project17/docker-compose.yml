version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: customs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customs-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=./data/customs.db
      - REDIS_URL=redis://redis:6379
      - CUSTOMS_API_BASE_URL=http://localhost:3001/mock-customs-api
      - CUSTOMS_API_KEY=demo-api-key-2024
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: customs-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
