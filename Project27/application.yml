server:
  port: 8080

spring:
  application:
    name: silver-care-booking
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./silver_care.db
    username: admin
    password: admin123
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: silver-care-secret-key-2024-for-secure-jwt-token-generation
  expiration: 86400000

wechat:
  pay:
    app-id: wx1234567890abcdef
    mch-id: 1234567890
    api-v3-key: your-api-v3-key
    serial-no: your-serial-number
    private-key-path: classpath:certs/apiclient_key.pem
    notify-url: http://localhost:8080/api/payment/notify

logging:
  level:
    com.silvercare: debug
    org.springframework.security: info
