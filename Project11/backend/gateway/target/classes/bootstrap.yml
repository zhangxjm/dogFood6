server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ttc-system
      config:
        server-addr: 127.0.0.1:8848
        namespace: ttc-system
        file-extension: yaml
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: command-service
          uri: lb://command-service
          predicates:
            - Path=/api/command/**
        - id: payload-service
          uri: lb://payload-service
          predicates:
            - Path=/api/payload/**
        - id: monitor-service
          uri: lb://monitor-service
          predicates:
            - Path=/api/monitor/**

logging:
  level:
    org.springframework.cloud.gateway: info
