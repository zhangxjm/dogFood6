version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    container_name: ttc-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123 --appendonly yes
    volumes:
      - ./redis/data:/data
    restart: always
    networks:
      - ttc-network

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: ttc-nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=derby
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=256m
      - JVM_XMX=256m
      - JVM_XMN=128m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/data:/home/nacos/data
      - ./nacos/logs:/home/nacos/logs
    restart: always
    networks:
      - ttc-network

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.7
    container_name: ttc-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    volumes:
      - ./rocketmq/namesrv/logs:/root/logs
    environment:
      - JAVA_OPT_EXT=-server -Xms256m -Xmx256m -Xmn128m
    restart: always
    networks:
      - ttc-network

  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    container_name: ttc-rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/conf/broker.conf
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./rocketmq/broker/logs:/root/logs
      - ./rocketmq/broker/store:/root/store
      - ./rocketmq/broker.conf:/home/rocketmq/conf/broker.conf
    environment:
      - JAVA_OPT_EXT=-server -Xms256m -Xmx256m -Xmn128m
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
    restart: always
    networks:
      - ttc-network

  rocketmq-console:
    image: styletang/rocketmq-console-ng:latest
    container_name: ttc-rocketmq-console
    ports:
      - "8088:8080"
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rocketmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false
    depends_on:
      - rocketmq-namesrv
    restart: always
    networks:
      - ttc-network

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: ttc-sentinel
    ports:
      - "8858:8858"
    environment:
      - JAVA_OPTS=-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858 -Dproject.name=sentinel-dashboard -Xms256m -Xmx256m
    restart: always
    networks:
      - ttc-network

networks:
  ttc-network:
    driver: bridge
