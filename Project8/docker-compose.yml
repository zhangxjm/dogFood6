services:
  mysql:
    image: mysql:8.0
    container_name: fishing_gear_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: fishing_gear
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-padmin123456"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
