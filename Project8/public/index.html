<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闲置渔具寄售平台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="container">
        <div class="logo">🎣 闲置渔具寄售平台</div>
        <nav class="nav">
          <a href="#" class="nav-link active" data-page="home">首页</a>
          <a href="#" class="nav-link" data-page="publish">发布寄售</a>
          <a href="#" class="nav-link" data-page="my">我的寄售</a>
          <a href="#" class="nav-link" data-page="messages">
            消息中心
            <span class="badge" id="unreadBadge" style="display:none;">0</span>
          </a>
        </nav>
        <div class="user-area" id="userArea">
          <button class="btn btn-primary" id="loginBtn">登录</button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <div id="pageContent"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2024 闲置渔具寄售平台 - 让您的闲置渔具焕发新生</p>
      </div>
    </footer>
  </div>

  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>用户登录</h3>
        <span class="close" id="closeLogin">&times;</span>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" required>
          </div>
          <div class="form-group">
            <label>手机号</label>
            <input type="text" id="loginPhone" placeholder="请输入手机号" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">登录/注册</button>
          <p class="form-tip">提示：新用户输入用户名和手机号后将自动注册</p>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
