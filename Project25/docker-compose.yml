version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: metaverse-training-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=metaverse-training-secret-key-2024
    volumes:
      - server-data:/app/data
    networks:
      - metaverse-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: metaverse-training-client
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001/ws
    depends_on:
      - server
    networks:
      - metaverse-network
    restart: unless-stopped

volumes:
  server-data:

networks:
  metaverse-network:
    driver: bridge
