version: '3.8'

services:
  seata-server:
    image: seataio/seata-server:1.8.0
    container_name: seata-server
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - SEATA_PORT=8091
      - STORE_MODE=file
    volumes:
      - seata-data:/seata-server/data
    networks:
      - payment-network

volumes:
  seata-data:

networks:
  payment-network:
    driver: bridge
