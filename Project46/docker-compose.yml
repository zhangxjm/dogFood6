version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: metaverse-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/server/data
    restart: unless-stopped
    networks:
      - metaverse-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: metaverse-client
    ports:
      - "3001:3001"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - metaverse-network

networks:
  metaverse-network:
    driver: bridge

volumes:
  server-data:
