spring:
  application:
    name: quantum-visualization
  datasource:
    url: jdbc:sqlite:./quantum.db
    driver-class-name: org.sqlite.JDBC
    username: admin
    password: admin123
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.quantum: DEBUG
    org.hibernate.SQL: DEBUG
