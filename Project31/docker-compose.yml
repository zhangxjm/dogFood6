version: '3.8'

services:
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    environment:
      - JAVA_OPT_EXT=-server -Xms256m -Xmx256m
    networks:
      - digital-twin-net

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    ports:
      - "10911:10911"
      - "10909:10909"
    volumes:
      - ./data/rocketmq/broker/logs:/home/rocketmq/logs
      - ./data/rocketmq/broker/store:/home/rocketmq/store
    environment:
      - JAVA_OPT_EXT=-server -Xms512m -Xmx512m
    depends_on:
      - rocketmq-namesrv
    networks:
      - digital-twin-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digital-twin-backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ROCKETMQ_NAME_SERVER=rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
      - rocketmq-broker
    networks:
      - digital-twin-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digital-twin-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - digital-twin-net
    restart: unless-stopped

networks:
  digital-twin-net:
    driver: bridge
