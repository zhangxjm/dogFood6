{{define "order_form.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - 短途货运调度系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {{template "nav" .}}
    <main class="content">
        <div class="page-header">
            <h1>创建运输订单</h1>
            <a href="/orders" class="btn btn-secondary">返回列表</a>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        <div class="form-card">
            <form action="/orders" method="POST">
                <h3>货物信息</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>货物名称</label>
                        <input type="text" name="cargo_name" required placeholder="例：电子产品">
                    </div>
                    <div class="form-group">
                        <label>货物重量（吨）</label>
                        <input type="number" name="cargo_weight" step="0.1" min="0.1" required placeholder="例：5.0">
                    </div>
                </div>

                <h3>调度信息</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>选择车辆</label>
                        <select name="vehicle_id" required>
                            <option value="">请选择可用车辆</option>
                            {{range .Vehicles}}
                            <option value="{{.ID}}">{{.LicensePlate}} - {{.VehicleType}} ({{.LoadCapacity}}吨) - {{.DriverName}}</option>
                            {{end}}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>选择路线</label>
                        <select name="route_id" required>
                            <option value="">请选择路线</option>
                            {{range .Routes}}
                            <option value="{{.ID}}">{{.Name}} ({{.Distance}}公里/{{.EstimatedTime}}分钟)</option>
                            {{end}}
                        </select>
                    </div>
                </div>

                <h3>发货人信息</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>发货人姓名</label>
                        <input type="text" name="shipper_name" required placeholder="例：张三">
                    </div>
                    <div class="form-group">
                        <label>发货人电话</label>
                        <input type="text" name="shipper_phone" required placeholder="例：13800138000">
                    </div>
                </div>

                <h3>收货人信息</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>收货人姓名</label>
                        <input type="text" name="receiver_name" required placeholder="例：李四">
                    </div>
                    <div class="form-group">
                        <label>收货人电话</label>
                        <input type="text" name="receiver_phone" required placeholder="例：13900139000">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">创建订单</button>
                    <a href="/orders" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
