version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server/src:/app/src
      - server-data:/app/data
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/app/data/exhibition.db
    networks:
      - metaverse-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
    depends_on:
      - server
    networks:
      - metaverse-net

volumes:
  server-data:

networks:
  metaverse-net:
    driver: bridge
