{% extends "base.html" %}
{% block title %}登录 - 方言文化分享平台{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title"><i class="fas fa-sign-in-alt"></i> 用户登录</h2>
            <form action="{{ url_for('login', next=request.args.get('next', '')) }}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> 用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> 密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block"><i class="fas fa-sign-in-alt"></i> 登录</button>
            </form>
            <div class="auth-footer">
                <p>还没有账号？<a href="{{ url_for('register') }}">立即注册</a></p>
            </div>
            <div class="demo-accounts">
                <p class="demo-title">演示账号：</p>
                <div class="demo-list">
                    <span class="demo-item">xiaobei / 123456</span>
                    <span class="demo-item">laowu / 123456</span>
                    <span class="demo-item">chuange / 123456</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
