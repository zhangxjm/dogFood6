{% extends "base.html" %}
{% block title %}发布方言 - 方言文化分享平台{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h2 class="form-title"><i class="fas fa-plus-circle"></i> {% if post %}编辑方言{% else %}发布方言{% endif %}</h2>

        <form action="{% if post %}{{ url_for('edit_post', post_id=post.id) }}{% else %}{{ url_for('publish') }}{% endif %}" method="post" enctype="multipart/form-data" class="publish-form">
            <div class="form-group">
                <label for="title"><i class="fas fa-heading"></i> 标题 <span class="required">*</span></label>
                <input type="text" id="title" name="title" value="{{ post.title if post else '' }}" placeholder="请输入方言标题" required maxlength="200">
            </div>

            <div class="form-group">
                <label for="region_id"><i class="fas fa-map-marker-alt"></i> 所属方言区</label>
                <select id="region_id" name="region_id">
                    <option value="">-- 请选择方言区 --</option>
                    {% for region in all_regions %}
                    <option value="{{ region.id }}" {% if post and post.region_id == region.id %}selected{% endif %}>{{ region.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="dialect_text"><i class="fas fa-comment-dots"></i> 方言原文</label>
                <textarea id="dialect_text" name="dialect_text" rows="3" placeholder="请用方言写下原文，如：侬好，长远勿见">{{ post.dialect_text if post else '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="translation"><i class="fas fa-language"></i> 普通话翻译</label>
                <textarea id="translation" name="translation" rows="3" placeholder="请翻译为普通话">{{ post.translation if post else '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="description"><i class="fas fa-info-circle"></i> 内容介绍</label>
                <textarea id="description" name="description" rows="4" placeholder="介绍这条方言的背景、用法、文化内涵等">{{ post.description if post else '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="audio"><i class="fas fa-microphone"></i> 方言音频</label>
                <div class="file-upload-area">
                    <input type="file" id="audio" name="audio" accept="audio/*">
                    <p class="file-hint">支持 MP3、WAV、OGG、M4A 等格式，最大 16MB</p>
                    {% if post and post.audio_path %}
                    <p class="current-file">当前音频：<a href="{{ url_for('static', filename='uploads/' + post.audio_path) }}" target="_blank">点击播放</a></p>
                    {% endif %}
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-paper-plane"></i> {% if post %}保存修改{% else %}立即发布{% endif %}
                </button>
                <a href="{{ url_for('index') }}" class="btn btn-outline btn-lg">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
