version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: satellite-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - sqlite_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - satellite-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: satellite-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - satellite-network

volumes:
  sqlite_data:

networks:
  satellite-network:
    driver: bridge
